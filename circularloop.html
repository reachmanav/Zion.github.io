<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>∞ — The Matrix</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #c9d1d9; font-family: 'Share Tech Mono', monospace; overflow-x: hidden; min-height: 100vh; }

    #binary-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
      pointer-events: none;
    }

    .page { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }

    .tagline {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: #00ff41;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(0,255,65,0.3);
      margin-bottom: 0.3rem;
      text-align: center;
    }
    .subtitle {
      font-size: 0.75rem;
      color: #8b949e;
      letter-spacing: 3px;
      margin-bottom: 2rem;
      text-align: center;
    }

    .loop-container { position: relative; width: min(90vw, 700px); height: min(90vw, 700px); }

    .loop-svg { width: 100%; height: 100%; }

    @keyframes rotate-slow { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes dash-flow { to { stroke-dashoffset: -30; } }
    .anim-dash { animation: dash-flow 2s linear infinite; }

    .node-icon { font-size: 1.4rem; }
    .node-year { font-family: 'Orbitron', monospace; font-size: 0.65rem; fill: #ffd740; letter-spacing: 1px; }
    .node-title { font-family: 'Orbitron', monospace; font-size: 0.6rem; letter-spacing: 2px; }
    .node-desc { font-family: 'Share Tech Mono', monospace; font-size: 0.5rem; fill: #8b949e; }

    .end-text {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #8b949e;
      line-height: 2;
      letter-spacing: 1px;
    }
    .end-text .chain { color: #ffd740; font-size: 0.8rem; margin-top: 0.5rem; }
    .end-text a { color: #00ff41; text-decoration: none; border-bottom: 1px solid rgba(0,255,65,0.2); }
    .end-text a:hover { border-color: #00ff41; }
  </style>
</head>
<body>

<canvas id="binary-bg"></canvas>

<div class="page">
  <div class="tagline">THE MATRIX IS A LOOP</div>
  <div class="subtitle">random · unfortunate events · push to try</div>

  <div class="loop-container">
    <svg class="loop-svg" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00ff41" opacity="0.6"/></marker>
        <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- THE RING — the actual circular loop path -->
      <circle cx="350" cy="350" r="260" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-dasharray="12,8" class="anim-dash" opacity="0.3"/>
      <circle cx="350" cy="350" r="260" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.08"/>

      <!-- Center ∞ -->
      <text x="350" y="360" font-family="'Orbitron', monospace" font-size="50" fill="#00ff41" text-anchor="middle" opacity="0.06" filter="url(#gl)">∞</text>
      <text x="350" y="345" font-family="'Orbitron', monospace" font-size="8" fill="#00ff41" text-anchor="middle" opacity="0.2" letter-spacing="4">LOOP NEVER ENDS</text>
      <text x="350" y="362" font-family="'Share Tech Mono', monospace" font-size="7" fill="#8b949e" text-anchor="middle" opacity="0.3">April 19 appears twice</text>

      <!--
        8 nodes placed on the circle (radius 260, center 350,350)
        Clock positions: 12, 1:30, 3, 4:30, 6, 7:30, 9, 10:30
      -->

      <!-- ══ NODE 1 (12 o'clock): THE MOVIE ══ -->
      <g transform="translate(350, 90)">
        <circle r="52" fill="#000" stroke="#00ff41" stroke-width="2"/>
        <text y="-22" text-anchor="middle" font-size="22">🎬</text>
        <text y="-4" text-anchor="middle" class="node-year">2000</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#00ff41">MATRIX MOVIE</text>
        <text y="24" text-anchor="middle" class="node-desc">decide: software engineer</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#00ff41" opacity="0.5">she typed on a black screen</text>
      </g>

      <!-- ══ NODE 2 (1:30): TWO ENGINEERS ══ -->
      <g transform="translate(534, 166)">
        <circle r="52" fill="#000" stroke="#ffd740" stroke-width="2"/>
        <text y="-22" text-anchor="middle" font-size="22">🎓</text>
        <text y="-4" text-anchor="middle" class="node-year">2006</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#ffd740">LOBO + ZION</text>
        <text y="24" text-anchor="middle" class="node-desc">software engineered</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#ffd740" opacity="0.5">they don't know it yet</text>
      </g>

      <!-- ══ NODE 3 (3 o'clock): THE GIFT ══ -->
      <g transform="translate(610, 350)">
        <circle r="52" fill="#000" stroke="#c084fc" stroke-width="2"/>
        <text y="-22" text-anchor="middle" font-size="22">🍫</text>
        <text y="-4" text-anchor="middle" class="node-year">2010 · APR 19</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#c084fc">THE GIFT</text>
        <text y="24" text-anchor="middle" class="node-desc">$0 or $1 · just be friends</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#c084fc" opacity="0.5">3:15 AM · a birthday</text>
      </g>

      <!-- ══ NODE 4 (4:30): SYSTEM CRASH ══ -->
      <g transform="translate(534, 534)">
        <circle r="52" fill="#000" stroke="#ff6b6b" stroke-width="2.5"/>
        <text y="-22" text-anchor="middle" font-size="22">⚡</text>
        <text y="-4" text-anchor="middle" class="node-year">2019 · APR 19</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#ff6b6b">SYSTEM CRASH</text>
        <text y="24" text-anchor="middle" class="node-desc">not the spoon that bends</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#ff6b6b" opacity="0.5">relearn A, B, C, D...</text>
      </g>

      <!-- ══ NODE 5 (6 o'clock): THE FRIEND ══ -->
      <g transform="translate(350, 610)">
        <circle r="52" fill="#000" stroke="#ffd740" stroke-width="2"/>
        <text y="-22" text-anchor="middle" font-size="22">🤝</text>
        <text y="-4" text-anchor="middle" class="node-year">RECOVERY</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#ffd740">THE FRIEND</text>
        <text y="24" text-anchor="middle" class="node-desc">now a CTO · builds a website</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#ffd740" opacity="0.5">same one who got the 🍫</text>
      </g>

      <!-- ══ NODE 6 (7:30): LOBO ══ -->
      <g transform="translate(166, 534)">
        <circle r="52" fill="#000" stroke="#ffd740" stroke-width="2.5" filter="url(#gl)"/>
        <text y="-22" text-anchor="middle" font-size="22">🐺</text>
        <text y="-4" text-anchor="middle" class="node-year">THE GIFT BACK</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#ffd740">LOBO</text>
        <text y="24" text-anchor="middle" class="node-desc">"I built this. learn from it."</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#ffd740" opacity="0.5">CTO → fresher</text>
      </g>

      <!-- ══ NODE 7 (9 o'clock): ZION ══ -->
      <g transform="translate(90, 350)">
        <circle r="52" fill="#000" stroke="#00ff41" stroke-width="2.5" filter="url(#gl)"/>
        <text y="-22" text-anchor="middle" font-size="22">⬡</text>
        <text y="-4" text-anchor="middle" class="node-year">BUILT</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#00ff41">ZION</text>
        <text y="24" text-anchor="middle" class="node-desc">6 agents · 14 constructs</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#00ff41" opacity="0.5">learned from Lobo · $0 cost</text>
      </g>

      <!-- ══ NODE 8 (10:30): TRINITY → THE MATRIX ══ -->
      <g transform="translate(166, 166)">
        <circle r="52" fill="#000" stroke="#ff6b6b" stroke-width="2"/>
        <text y="-22" text-anchor="middle" font-size="22">🔺</text>
        <text y="-4" text-anchor="middle" class="node-year">2026</text>
        <text y="10" text-anchor="middle" class="node-title" fill="#ff6b6b">TRINITY</text>
        <text y="24" text-anchor="middle" class="node-desc">named after the movie</text>
        <text y="36" text-anchor="middle" class="node-desc" fill="#ff6b6b" opacity="0.5">→ builds The Matrix site</text>
      </g>

      <!-- Arrow hint: Trinity loops back to The Movie (the loop!) -->
      <path d="M200,125 Q250,95 295,90" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4" marker-end="url(#ag)"/>
      <text x="248" y="82" font-family="'Share Tech Mono', monospace" font-size="6" fill="#00ff41" text-anchor="middle" opacity="0.4">same name</text>

    </svg>
  </div>

  <div class="end-text">
    the friend who received a $0 gift in 2010<br>
    doesn't know this site exists.<br><br>
    this site <em style="color:#ffd740">is</em> the gift.<br>
    the loop closes where it started.<br>
    <div class="chain">🍫 → 🐺 → ⬡ → 🔺 → 🌐 → 🍫</div>
    <br>
    <a href="index.html">← back to the matrix</a>
  </div>
</div>

<script>
(function() {
  var c = document.getElementById('binary-bg');
  var ctx = c.getContext('2d');
  var w, h, cols, drops;

  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
    cols = Math.floor(w / 18);
    drops = [];
    for (var i = 0; i < cols; i++) drops[i] = Math.random() * h / 18;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = '14px "Share Tech Mono", monospace';

    for (var i = 0; i < cols; i++) {
      var char = Math.random() > 0.5 ? '1' : '0';
      var x = i * 18;
      var y = drops[i] * 18;

      var brightness = Math.random();
      if (brightness > 0.97) {
        ctx.fillStyle = 'rgba(0, 255, 65, 0.8)';
      } else if (brightness > 0.9) {
        ctx.fillStyle = 'rgba(0, 255, 65, 0.3)';
      } else {
        ctx.fillStyle = 'rgba(0, 255, 65, 0.06)';
      }

      ctx.fillText(char, x, y);

      if (y > h && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
